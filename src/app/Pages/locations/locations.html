<div class="w-full  xl:w-5/6 mx-auto grid grid-cols-1 md:grid-cols-4 xl:grid-cols-5 gap-6 p-6 ">

  <div *ngFor="let location of locations; let i = index"
  
       class="bg-pink-100 rounded-2xl shadow-md hover:scale-105 transition cursor-pointer overflow-hidden">

     
       <div 
  class="h-48 bg-cover bg-center rounded-t-2xl"
  [style.background-image]="'url(https://cdn.thesimpsonsapi.com/500' + location.image_path + ')'">
</div>
 

    <div class="m-4">
      <h3 class="font-bold text-lg text-center">
      {{location.name}}
    </h3>

   
    
    </div>

  </div>
  <button 
  *ngIf="showScrollTop"
  (click)="scrollToTop()"
  class="
  fixed bottom-40 lg:bottom-25 right-5 lg:right-10
  flex items-center justify-center

  w-14 h-14
  bg-yellow-300 hover:bg-yellow-400
  text-xl text-white
  rounded-full shadow-lg
  transition duration-300
  ">

  <i class="fa-solid fa-arrow-up"></i>

</button>

</div>
<app-spinner *ngIf="loading"></app-spinner>
