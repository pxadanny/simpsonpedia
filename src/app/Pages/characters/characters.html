<app-spinner *ngIf="loading"></app-spinner>
<div class="w-5/6 mx-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 p-6 ">

  <div *ngFor="let character of characters; let i = index"
  
       class="bg-white rounded-2xl shadow-md hover:scale-105 transition cursor-pointer overflow-hidden">

     
       <div class="bg-[url('/fondo.png')] bg-cover  pt-4">
        <img
[src]="'https://cdn.thesimpsonsapi.com/500' + character.portrait_path"
      class="w-full h-40 object-contain"
    />
       </div>
 

    <div class="m-4">
      <h3 class="font-bold text-lg text-center">
      {{character.name}}
    </h3>

    <p class="text-sm text-gray-500 text-center">
      {{character.occupation}}
    </p>

    <p class="text-xs text-center"
       [ngClass]="character.status === 'Alive' ? 'text-green-500' : 'text-red-500'">

      {{character.status}}

    </p>
    </div>

  </div>

  <div class="flex justify-center items-center gap-4 mt-6">

  <button 
    (click)="prevPage()" 
    [disabled]="!prevUrl || loading"
    class="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed transition">
    
    ← Anterior
  </button>

  <button 
    (click)="nextPage()" 
    [disabled]="!nextUrl || loading"
    class="px-4 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition">
    
    Siguiente →
  </button>

</div>

</div>
